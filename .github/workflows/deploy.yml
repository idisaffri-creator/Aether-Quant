name: Deploy VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"

jobs:
  deploy:
    name: Pull · Build · Reload
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/aether-energy
            ./deploy.sh
            sleep 3
            pm2 status aether
            curl -sS -o /dev/null -w "health=%{http_code}\n" http://127.0.0.1:3000/ready
