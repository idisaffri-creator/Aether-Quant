name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    name: Notify deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: |
          echo "Deploy to 72.62.255.206 triggered at $(date)"
          echo "VPS will run: cd /root/aether-energy && git pull && pnpm install && pnpm build && pm2 restart aether"
