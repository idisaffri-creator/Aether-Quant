name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test -- server
        env:
          NODE_ENV: test

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start app in background
        run: |
          cp .env.example .env 2>/dev/null || echo "JWT_SECRET=test-jwt-secret-for-ci-only-not-secure" > .env
          echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/test" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "PORT=3000" >> .env
          npm run start &
          sleep 5
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E
        run: E2E_BASE_URL=http://localhost:3000 pnpm test:e2e
        env:
          CI: true
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
