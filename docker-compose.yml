version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev}
      POSTGRES_DB: aether_energy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://aether:${POSTGRES_PASSWORD:-aether_dev}@postgres:5432/aether_energy
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      VITE_SOLANA_RPC_URL: ${VITE_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
