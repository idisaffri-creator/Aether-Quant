# Aether Energy — Postgres tuning for 24GB+ RAM, 8 cores
# Apply to /etc/postgresql/16/main/postgresql.conf (or wherever postgresql.conf is)

# ─── Memory ──────────────────────────────────────────────────────────────────
# Total RAM: 24GB. Reserve ~4GB for OS, Redis, Node.
# shared_buffers: 25% of available = ~6GB
shared_buffers = 6GB

# effective_cache_size: ~75% of total = ~18GB (planner hint, not actual allocation)
effective_cache_size = 18GB

# work_mem: per-query sort/hash. 32MB is good for analytics queries.
# Total = work_mem * max_connections * active_queries — keep modest.
work_mem = 32MB

# maintenance_work_mem: for VACUUM, CREATE INDEX, etc. Higher = faster.
maintenance_work_mem = 1GB

# WAL buffers: default is fine but make explicit
wal_buffers = 64MB

# ─── Connections ────────────────────────────────────────────────────────────
max_connections = 200
# Each backend uses ~10MB. 200 connections = ~2GB. OK with shared_buffers 6GB.

# ─── Query planning ─────────────────────────────────────────────────────────
# SSD: random_page_cost should be close to seq_page_cost
random_page_cost = 1.1
effective_io_concurrency = 200  # SSD can do many parallel reads

# Encourage index scans
# (already set above with random_page_cost = 1.1)

# ─── WAL ─────────────────────────────────────────────────────────────────────
# WAL level (default replica-safe)
wal_level = replica
# Checkpoint tuning — spread checkpoints out
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
# WAL compression if supported
# wal_compression = on  # PG 15+, saves space

# ─── Logging ────────────────────────────────────────────────────────────────
# Slow query log: log queries > 1s
log_min_duration_statement = 1000

# What to log
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a '
log_statement = 'ddl'             # log all DDL
log_duration = off                 # don't log every query (already have slow query log)
log_lock_waits = on                # log lock waits > 1s
log_temp_files = 10MB              # log temp file usage
log_autovacuum_min_duration = 0    # log all autovacuum runs

# ─── Statistics ─────────────────────────────────────────────────────────────
# Required for query optimization
shared_preload_libraries = 'pg_stat_statements'
track_io_timing = on
track_activities = on
track_counts = on
track_functions = pl

# pg_stat_statements config
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on

# Autovacuum — more aggressive for high-write tables
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 1000

# ─── Replication (for read replicas) ───────────────────────────────────────
# Enable if you add a read replica
# wal_keep_size = 1GB
# max_wal_senders = 10
# hot_standby = on
