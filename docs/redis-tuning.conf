# Aether Energy — Redis tuning
# Apply to /etc/redis/redis.conf

# ─── Memory ─────────────────────────────────────────────────────────────────
# Total RAM: 24GB. Redis budget: 4GB (Node needs the rest).
maxmemory 4gb
maxmemory-policy allkeys-lru       # evict least-recently-used keys when full
maxmemory-samples 10               # check 10 random keys (faster LRU)

# ─── Persistence ───────────────────────────────────────────────────────────
# RDB snapshots (cheap, good for backups)
save 900 1                          # 1+ key changed in 15min
save 300 10                         # 10+ keys changed in 5min
save 60 10000                       # 10k+ keys changed in 1min

# AOF: append-only file (durable but slower)
# Disabled for speed; enable if you need durability over speed
appendonly no
appendfsync everysec                # if AOF enabled: fsync every second

# ─── Network ───────────────────────────────────────────────────────────────
bind 127.0.0.1 ::1
protected-mode yes
port 6379
tcp-backlog 511
timeout 300                         # close idle clients after 5min
tcp-keepalive 60                    # send keepalive every 60s

# ─── Performance ───────────────────────────────────────────────────────────
# Hash table sizes (more efficient memory)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Threading (Redis 6+)
io-threads 4                        # 4 I/O threads (8 cores available)
io-threads-do-reads yes

# ─── Pub/Sub for WebSocket scaling ─────────────────────────────────────────
# No special config — uses default pub/sub channel
# Client maxmemory affects pub/sub? No, pub/sub is independent of maxmemory.
client-output-buffer-limit pubsub 32mb 8mb 60
client-output-buffer-limit normal 0 0 0

# ─── Logging ───────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log
slowlog-log-slower-than 10000       # log commands > 10ms
slowlog-max-len 128
latency-monitor-threshold 5        # track commands > 5ms
