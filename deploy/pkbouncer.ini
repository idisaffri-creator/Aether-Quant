# pgbouncer — Aether Energy connection pool
# /etc/pgbouncer/pgbouncer.ini
# Listens on 127.0.0.1:6432, pools to local Postgres on 5433

[databases]
aether = host=127.0.0.1 port=5433 dbname=aether_energy

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
log_connections = 0
log_disconnections = 0
stats_period = 60
# Pool settings
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3
# Timeouts
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30000
client_login_timeout = 60
# Admin
admin_users = postgres
stats_users = postgres
