  <head>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary Meta Tags -->
    <title>Aether Energy – AI-Powered Quantitative Trading for Energy Markets</title>
    <meta name="description" content="Deploy autonomous AI agents that trade crude oil, gold, and natural gas around the clock. Institutional quant tools with Monte Carlo risk analytics, visual strategy builder, and real-time market data — no fund, no team required." />

    <!-- Canonical -->
    <link rel="canonical" href="https://aether-energy.ai/" />

    <!-- Open Graph / Facebook -->

    <!-- Twitter -->

    <meta name="twitter:title" content="Aether Energy – AI-Powered Quantitative Trading" />
    <meta name="twitter:description" content="Deploy autonomous AI agents that trade crude oil, gold, and natural gas. Institutional quant tools, real-time market data, free to start." />
    <meta name="twitter:image" content="https://aether-energy.ai/og-image.png" />
    <meta name="twitter:image:alt" content="Aether Energy Trading Platform" />

    <!-- Fonts -->
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Aether Energy free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — paper trading is free forever with $100k virtual capital. Real-money trading via Alpaca requires KYC verification."
          }
        },
        {
          "@type": "Question",
          "name": "What markets does Aether support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Crude oil (WTI, Brent), natural gas, gold, silver, copper, heating oil, RBOB gasoline, wheat, and E-mini S&P futures."
          }
        },
        {
          "@type": "Question",
          "name": "How fast is execution?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Paper trades execute in ~12ms. Live trades via Alpaca execute in ~50-200ms depending on venue."
          }
        },
        {
          "@type": "Question",
          "name": "Can I deploy my own strategies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — the visual strategy builder supports RSI, MACD, Bollinger Bands, and custom rule-based logic. You can also publish to the marketplace or clone others' strategies."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
